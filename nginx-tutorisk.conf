server {
    listen 80;
    server_name tutorisk.net www.tutorisk.net lcms.tutorisk.net;
    return 301 https://$host$request_uri;
}

# ── Site corporate ──────────────────────────────────────────
server {
    listen 443 ssl;
    server_name tutorisk.net www.tutorisk.net;
    root /var/www/tutorisk-site;
    index index.html;
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/tutorisk.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tutorisk.net/privkey.pem;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    # Le type MIME du manifeste n'est pas connu de nginx par défaut
    types { application/manifest+json webmanifest; }


    # HTML : jamais figé, on revalide à chaque visite
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Favicons + manifest : cache court, revalidation obligatoire
    location ~* ^/assets/(favicon|icon-|apple-touch-icon|site\.webmanifest) {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # CSS / JS / images : cache long MAIS revalidable (pas d'immutable)
    # Le cache-busting ?v=N dans le HTML force le rechargement au besoin.
    location ~* \.(css|js|png|jpg|jpeg|svg|ico|woff2)$ {
        add_header Cache-Control "public, max-age=604800, must-revalidate";
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}

# ── LCMS ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name lcms.tutorisk.net;
    root /var/www/tutorisk-lcms-frontend;
    index index.html;
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/tutorisk.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tutorisk.net/privkey.pem;

    client_max_body_size 510M;

    types { application/manifest+json webmanifest; }

    location /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # index.html jamais caché : il pointe vers les bundles hashés de Vite
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* ^/(favicon|icon-|apple-touch-icon|site\.webmanifest) {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Vite génère des noms hashés (index-XXXX.js) : cache long sans risque
    location /assets/ {
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
